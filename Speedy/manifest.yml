modules:
  jira:projectPage:
    - key: speedy-hello-world-project-page
      resource: main
      resolver:
        function: resolver
      render: native
      title: Speedy
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
permissions:
  scopes:
    - read:jira-work
    - read:jira-user

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/3b5ac12e-7160-495b-80ac-f945f42aa976
